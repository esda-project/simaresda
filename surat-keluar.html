<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Surat Keluar — SIMARESDA Arsip</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/simas.css">
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <div class="notif-bar" onclick="openNotifModal()"><span class="notif-pulse"></span><span id="notif-text">Sistem aktif</span></div>
  <div class="topbar">
    <div class="topbar-title">Surat Keluar</div>
    <div class="search-wrap no-print"><span class="search-ico">🔍</span><input type="text" id="g-search" placeholder="Cari nomor, tujuan, perihal..." oninput="applyFilter()"></div>
    <div class="topbar-actions no-print">
      <button class="icon-btn" id="btn-theme" onclick="toggleDark()">🌙</button>
      <button class="icon-btn" onclick="window.print()">🖨️</button>
      <div style="position:relative"><button class="icon-btn" onclick="openNotifModal()">🔔</button><span id="notif-count" style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center">0</span></div>
    </div>
  </div>
  <div class="content">
    <div class="toolbar no-print">
      <button class="btn btn-primary" onclick="openAdd()">+ Tambah Surat Keluar</button>
      <select id="filter-status" onchange="applyFilter()" style="width:148px"><option value="">Semua Status</option><option>Draft</option><option>Terkirim</option><option>Dibatalkan</option></select>
      <select id="filter-kat" onchange="applyFilter()" style="width:148px"><option value="">Semua Kategori</option><option>Umum</option><option>Keuangan</option><option>Kepegawaian</option><option>Teknis</option></select>
      <button class="btn btn-secondary" onclick="exportCSV('tbl-keluar','surat-keluar')">⬇ CSV</button>
      <button class="btn btn-secondary" onclick="resetFilter()">↺ Reset</button>
      <span id="row-count" style="font-size:12px;color:var(--text3);margin-left:auto"></span>
    </div>
    <div class="table-wrap">
      <table id="tbl-keluar">
        <thead><tr><th>No. Agenda</th><th>No. Surat</th><th>Tgl Surat</th><th>Tujuan</th><th>Perihal</th><th>Kategori</th><th>Sifat</th><th>Penandatangan</th><th>Status</th><th class="no-print">Aksi</th></tr></thead>
        <tbody id="body-keluar"></tbody>
      </table>
    </div>
    <div class="pagination no-print" id="pagination"></div>
  </div>
</div>

<!-- MODAL FORM -->
<div class="modal-overlay" id="modal-keluar" style="display:none" onclick="if(event.target===this)closeModal('modal-keluar')">
  <div class="modal modal-lg">
    <div class="modal-header"><div class="modal-title" id="m-title">📤 Tambah Surat Keluar</div><button class="icon-btn" onclick="closeModal('modal-keluar')">✕</button></div>
    <div class="modal-body">
      <div class="alert alert-info" style="margin-bottom:14px">💡 Nomor surat akan di-generate otomatis dalam format <strong>{SEQ}/{KODE}/{BLN-ROMAWI}/{TAHUN}</strong></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nomor Surat (auto)</label><input class="form-control" id="m-nosurat" placeholder="Akan diisi otomatis" readonly></div>
        <div class="form-group"><label class="form-label">Tanggal Surat <span class="req">*</span></label><input class="form-control" type="date" id="m-tgl"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tujuan <span class="req">*</span></label><input class="form-control" id="m-tujuan" placeholder="Instansi / nama tujuan"></div>
        <div class="form-group"><label class="form-label">Perihal <span class="req">*</span></label><input class="form-control" id="m-perihal" placeholder="Perihal surat keluar"></div>
      </div>
      <div class="form-row3">
        <div class="form-group"><label class="form-label">Kategori</label><select class="form-control" id="m-kat"><option>Umum</option><option>Keuangan</option><option>Kepegawaian</option><option>Teknis</option></select></div>
        <div class="form-group"><label class="form-label">Sifat</label><select class="form-control" id="m-sifat"><option>Biasa</option><option>Penting</option><option>Segera</option></select></div>
        <div class="form-group"><label class="form-label">Status</label><select class="form-control" id="m-status"><option>Draft</option><option>Terkirim</option><option>Dibatalkan</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Penandatangan</label><input class="form-control" id="m-ttd" placeholder="Nama / jabatan pejabat penanda tangan"></div>
        <div class="form-group"><label class="form-label">Kode Unit</label><input class="form-control" id="m-kode" placeholder="ORG / KEU / SDM" value="ORG"></div>
      </div>
      <div class="form-group"><label class="form-label">Tembusan</label><input class="form-control" id="m-tembusan" placeholder="Cth: Kepala Biro, Sekretaris (pisah koma)"></div>
      <div class="form-group"><label class="form-label">Keterangan</label><textarea class="form-control" id="m-ket" placeholder="Catatan tambahan..."></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-keluar')">Batal</button><button class="btn btn-primary" onclick="saveSuratKeluar()">💾 Simpan</button></div>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modal-detail" style="display:none" onclick="if(event.target===this)closeModal('modal-detail')">
  <div class="modal"><div class="modal-header"><div class="modal-title">📄 Detail Surat Keluar</div><button class="icon-btn" onclick="closeModal('modal-detail')">✕</button></div><div class="modal-body" id="detail-body"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-detail')">Tutup</button><button class="btn btn-primary" onclick="window.print()">🖨️ Print</button></div></div>
</div>

<div class="modal-overlay" id="modal-notif" style="display:none" onclick="if(event.target===this)closeModal('modal-notif')"><div class="modal" style="width:min(420px,95vw)"><div class="modal-header"><div class="modal-title">🔔 Notifikasi</div><button class="icon-btn" onclick="closeModal('modal-notif')">✕</button></div><div class="modal-body" id="notif-list" style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto"></div></div></div>

<script src="assets/simas-ui.js"></script>
<script>
document.getElementById('sidebar').innerHTML=`<div class="logo-wrap"><div class="logo-icon">📁</div><div><div class="logo-title">SIMARESDA</div><div class="logo-year">Arsip Daerah · 2025–2030</div></div></div><nav class="nav-scroll"><div class="nav-section">Menu Utama</div><a class="nav-item" href="index.html"><span class="nav-icon">📊</span>Dashboard</a><a class="nav-item" href="surat-masuk.html"><span class="nav-icon">📥</span>Surat Masuk</a><a class="nav-item active" href="surat-keluar.html"><span class="nav-icon">📤</span>Surat Keluar</a><div class="nav-section">Arsip</div><a class="nav-item" href="peminjaman.html"><span class="nav-icon">🔖</span>Peminjaman</a><a class="nav-item" href="penyimpanan.html"><span class="nav-icon">🗄️</span>Penyimpanan</a><a class="nav-item" href="pemusnahan.html"><span class="nav-icon">🗑️</span>Pemusnahan</a><div class="nav-section">Referensi</div><a class="nav-item" href="regulasi.html"><span class="nav-icon">📋</span>Regulasi</a><a class="nav-item" href="audit.html"><span class="nav-icon">📝</span>Audit Trail</a></nav><div class="sidebar-footer"><div class="user-pill"><div class="avatar" data-user-avatar>AD</div><div class="user-info"><div class="user-name" data-user-name>Administrator</div><div class="user-role" data-user-role>Admin</div></div></div><button class="logout-btn" onclick="logout()">↩ Keluar</button></div>`;
simasInit();

const ROM=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
let seq=4,editIdx=null,page=1;
let data=[
  {id:'SK-2025-001',no:'100/ORG/I/2025',tgl:'2025-01-06',tujuan:'Kementerian Kesehatan RI',perihal:'Konfirmasi Penerimaan Laporan Tahunan',kat:'Umum',sifat:'Biasa',ttd:'Kepala Biro',kode:'ORG',tembusan:'Sekretaris',ket:'',status:'Terkirim'},
  {id:'SK-2025-002',no:'101/ORG/I/2025',tgl:'2025-01-09',tujuan:'Kementerian PUPR',perihal:'Tanggapan Pelaksanaan Audit Internal',kat:'Teknis',sifat:'Penting',ttd:'Sekretaris',kode:'ORG',tembusan:'Kepala Biro',ket:'',status:'Terkirim'},
  {id:'SK-2025-003',no:'102/ORG/I/2025',tgl:'2025-01-15',tujuan:'Badan Kepegawaian Negara',perihal:'Daftar Nama Peserta Diklat Prajabatan 2025',kat:'Kepegawaian',sifat:'Biasa',ttd:'Kepala Bagian',kode:'ORG',tembusan:'',ket:'',status:'Draft'},
];
let filtered=[...data];
const RPP=10;

function autoNo(kode){
  const now=new Date();
  return `${99+seq}/${kode||'ORG'}/${ROM[now.getMonth()]}/${now.getFullYear()}`;
}

function renderTable(){
  const start=(page-1)*RPP,rows=filtered.slice(start,start+RPP);
  document.getElementById('body-keluar').innerHTML=rows.length?rows.map(s=>`
    <tr>
      <td class="td-mono">${s.id}</td>
      <td class="td-mono" style="font-size:11px">${s.no}</td>
      <td>${s.tgl}</td>
      <td><strong>${s.tujuan}</strong></td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.perihal}">${s.perihal}</td>
      <td>${badgePlain(s.kat,'b-gray')}</td>
      <td>${badgePlain(s.sifat,s.sifat==='Segera'?'b-red':s.sifat==='Penting'?'b-yellow':'b-gray')}</td>
      <td>${s.ttd}</td>
      <td>${badge(s.status)}</td>
      <td class="no-print" style="white-space:nowrap">
        <button class="btn btn-secondary btn-xs" onclick='viewDetail(${JSON.stringify(s)})'>👁</button>
        <button class="btn btn-secondary btn-xs" onclick='editRow(${JSON.stringify(s)})'>✏️</button>
        <button class="btn btn-danger btn-xs" onclick="deleteRow('${s.id}')" data-require-role="Admin">🗑</button>
      </td>
    </tr>`).join(''):`<tr><td colspan="10"><div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Tidak ada data</div></div></td></tr>`;
  document.getElementById('row-count').textContent=filtered.length?`${start+1}–${Math.min(start+RPP,filtered.length)} dari ${filtered.length} surat`:'';
  renderPagination();applyRoleGuards(window.SIMARESDA_USER?.role);
}
function renderPagination(){
  const total=Math.ceil(filtered.length/RPP),el=document.getElementById('pagination');
  if(total<=1){el.innerHTML='';return;}
  let h=`<button class="page-btn" onclick="gp(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=total;i++)h+=`<button class="page-btn ${i===page?'active':''}" onclick="gp(${i})">${i}</button>`;
  h+=`<button class="page-btn" onclick="gp(${page+1})" ${page===total?'disabled':''}>›</button>`;
  el.innerHTML=h;
}
function gp(p){const t=Math.ceil(filtered.length/RPP);if(p<1||p>t)return;page=p;renderTable();}
function applyFilter(){
  const q=document.getElementById('g-search').value.toLowerCase();
  const st=document.getElementById('filter-status').value;
  const kt=document.getElementById('filter-kat').value;
  filtered=data.filter(s=>{
    if(q&&!JSON.stringify(s).toLowerCase().includes(q))return false;
    if(st&&s.status!==st)return false;
    if(kt&&s.kat!==kt)return false;
    return true;
  });
  page=1;renderTable();
}
function resetFilter(){document.getElementById('g-search').value='';document.getElementById('filter-status').value='';document.getElementById('filter-kat').value='';filtered=[...data];page=1;renderTable();}

function openAdd(){
  editIdx=null;document.getElementById('m-title').textContent='📤 Tambah Surat Keluar';
  ['m-tgl','m-tujuan','m-perihal','m-ttd','m-tembusan','m-ket'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-kode').value='ORG';
  document.getElementById('m-nosurat').value=autoNo('ORG');
  openModal('modal-keluar');
}
document.getElementById('m-kode').addEventListener('input',function(){document.getElementById('m-nosurat').value=autoNo(this.value);});

function editRow(s){
  editIdx=s.id;document.getElementById('m-title').textContent='✏️ Edit Surat Keluar';
  document.getElementById('m-nosurat').value=s.no;document.getElementById('m-tgl').value=s.tgl;
  document.getElementById('m-tujuan').value=s.tujuan;document.getElementById('m-perihal').value=s.perihal;
  document.getElementById('m-kat').value=s.kat;document.getElementById('m-sifat').value=s.sifat;
  document.getElementById('m-status').value=s.status;document.getElementById('m-ttd').value=s.ttd;
  document.getElementById('m-kode').value=s.kode||'ORG';document.getElementById('m-tembusan').value=s.tembusan||'';
  document.getElementById('m-ket').value=s.ket||'';
  openModal('modal-keluar');
}
function saveSuratKeluar(){
  const tujuan=document.getElementById('m-tujuan').value.trim();
  const perihal=document.getElementById('m-perihal').value.trim();
  const tgl=document.getElementById('m-tgl').value;
  if(!tujuan||!perihal||!tgl){showToast('Harap isi field wajib (*)','danger');return;}
  const kode=document.getElementById('m-kode').value||'ORG';
  const obj={
    id:editIdx||`SK-2025-${String(seq).padStart(3,'0')}`,
    no:editIdx?document.getElementById('m-nosurat').value:autoNo(kode),
    tgl,tujuan,perihal,kat:document.getElementById('m-kat').value,
    sifat:document.getElementById('m-sifat').value,status:document.getElementById('m-status').value,
    ttd:document.getElementById('m-ttd').value,kode,
    tembusan:document.getElementById('m-tembusan').value,ket:document.getElementById('m-ket').value,
  };
  if(!editIdx)seq++;
  if(editIdx){const i=data.findIndex(d=>d.id===editIdx);if(i>=0)data[i]=obj;}
  else data.unshift(obj);
  editIdx=null;closeModal('modal-keluar');filtered=[...data];renderTable();
  showToast('✅ Surat keluar disimpan','success');
  pushNotif(`📤 Surat keluar ${obj.id} ${editIdx?'diperbarui':'ditambahkan'}`,'success');
}
function deleteRow(id){
  if(!confirm(`Hapus surat keluar ${id}?`))return;
  data=data.filter(d=>d.id!==id);filtered=[...data];renderTable();showToast(`🗑️ ${id} dihapus`,'warn');
}
function viewDetail(s){
  document.getElementById('detail-body').innerHTML=`
  <table style="width:100%;border-collapse:collapse;font-size:13px">
    ${[['No. Agenda',s.id],['No. Surat',`<span class="td-mono">${s.no}</span>`],['Tanggal Surat',s.tgl],['Tujuan',`<strong>${s.tujuan}</strong>`],['Perihal',s.perihal],['Kategori',s.kat],['Sifat',s.sifat],['Status',badge(s.status)],['Penandatangan',s.ttd||'—'],['Tembusan',s.tembusan||'—'],['Keterangan',s.ket||'—']].map(([k,v])=>`<tr><td style="padding:8px 12px;width:38%;font-weight:600;color:var(--text2);border:1px solid var(--border)">${k}</td><td style="padding:8px 12px;border:1px solid var(--border)">${v}</td></tr>`).join('')}
  </table>`;
  openModal('modal-detail');
}
renderTable();
</script>
</body>
</html>
