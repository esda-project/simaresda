<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audit Trail — SIMARESDA</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/simas.css">
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <div class="notif-bar" onclick="openNotifModal()"><span class="notif-pulse"></span><span id="notif-text">Sistem aktif</span></div>
  <div class="topbar">
    <div class="topbar-title">Audit Trail</div>
    <div class="search-wrap no-print"><span class="search-ico">🔍</span><input type="text" id="g-search" placeholder="Cari pengguna, aksi, objek..." oninput="applyFilter()"></div>
    <div class="topbar-actions no-print">
      <button class="icon-btn" id="btn-theme" onclick="toggleDark()">🌙</button>
      <button class="icon-btn" onclick="window.print()">🖨️</button>
      <div style="position:relative"><button class="icon-btn" onclick="openNotifModal()">🔔</button><span id="notif-count" style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center">0</span></div>
    </div>
  </div>
  <div class="content">
    <!-- Stats bar -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px">
      <div class="stat-card" style="padding:12px"><div class="stat-label">Total Log</div><div class="stat-val" id="st-total">0</div></div>
      <div class="stat-card" style="padding:12px"><div class="stat-label">Login</div><div class="stat-val" id="st-login" style="color:var(--green)">0</div></div>
      <div class="stat-card" style="padding:12px"><div class="stat-label">Create</div><div class="stat-val" id="st-create" style="color:var(--blue)">0</div></div>
      <div class="stat-card" style="padding:12px"><div class="stat-label">Update</div><div class="stat-val" id="st-update" style="color:var(--yellow)">0</div></div>
      <div class="stat-card" style="padding:12px"><div class="stat-label">Delete</div><div class="stat-val" id="st-delete" style="color:var(--red)">0</div></div>
    </div>

    <div class="toolbar no-print">
      <select id="f-role" onchange="applyFilter()" style="width:140px"><option value="">Semua Role</option><option>Admin</option><option>Pengelola</option><option>TU</option></select>
      <select id="f-aksi" onchange="applyFilter()" style="width:148px"><option value="">Semua Aksi</option><option>LOGIN</option><option>LOGOUT</option><option>CREATE</option><option>READ</option><option>UPDATE</option><option>DELETE</option><option>DELETE (SOFT)</option><option>PRINT</option><option>EXPORT</option></select>
      <select id="f-tabel" onchange="applyFilter()" style="width:160px"><option value="">Semua Tabel</option><option>surat_masuk</option><option>surat_keluar</option><option>arsip</option><option>peminjaman_arsip</option><option>pemusnahan_arsip</option><option>profiles</option><option>auth</option></select>
      <input type="date" id="f-dari" onchange="applyFilter()" title="Dari tanggal" style="width:138px">
      <input type="date" id="f-sampai" onchange="applyFilter()" title="Sampai tanggal" style="width:138px">
      <button class="btn btn-secondary" onclick="exportCSV('tbl-audit','audit-trail')">⬇ CSV</button>
      <button class="btn btn-secondary" onclick="resetFilter()">↺ Reset</button>
      <span id="row-count" style="font-size:12px;color:var(--text3);margin-left:auto"></span>
    </div>

    <div class="table-wrap">
      <table id="tbl-audit">
        <thead>
          <tr>
            <th>#</th>
            <th>Waktu</th>
            <th>Pengguna</th>
            <th>Role</th>
            <th>Aksi</th>
            <th>Tabel</th>
            <th>Record ID</th>
            <th>IP Address</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="body-audit"></tbody>
      </table>
    </div>
    <div class="pagination no-print" id="pagination"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-notif" style="display:none" onclick="if(event.target===this)closeModal('modal-notif')"><div class="modal" style="width:min(420px,95vw)"><div class="modal-header"><div class="modal-title">🔔 Notifikasi</div><button class="icon-btn" onclick="closeModal('modal-notif')">✕</button></div><div class="modal-body" id="notif-list" style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto"></div></div></div>

<script src="assets/simas-ui.js"></script>
<script>
document.getElementById('sidebar').innerHTML=`<div class="logo-wrap"><div class="logo-icon">📁</div><div><div class="logo-title">SIMARESDA</div><div class="logo-year">Arsip Daerah · 2025–2030</div></div></div><nav class="nav-scroll"><div class="nav-section">Menu Utama</div><a class="nav-item" href="index.html"><span class="nav-icon">📊</span>Dashboard</a><a class="nav-item" href="surat-masuk.html"><span class="nav-icon">📥</span>Surat Masuk</a><a class="nav-item" href="surat-keluar.html"><span class="nav-icon">📤</span>Surat Keluar</a><div class="nav-section">Arsip</div><a class="nav-item" href="peminjaman.html"><span class="nav-icon">🔖</span>Peminjaman</a><a class="nav-item" href="penyimpanan.html"><span class="nav-icon">🗄️</span>Penyimpanan</a><a class="nav-item" href="pemusnahan.html"><span class="nav-icon">🗑️</span>Pemusnahan</a><div class="nav-section">Referensi</div><a class="nav-item" href="regulasi.html"><span class="nav-icon">📋</span>Regulasi</a><a class="nav-item active" href="audit.html"><span class="nav-icon">📝</span>Audit Trail</a></nav><div class="sidebar-footer"><div class="user-pill"><div class="avatar" data-user-avatar>AD</div><div class="user-info"><div class="user-name" data-user-name>Administrator</div><div class="user-role" data-user-role>Admin</div></div></div><button class="logout-btn" onclick="logout()">↩ Keluar</button></div>`;
simasInit();

const AKSI_COLOR={LOGIN:'b-green',LOGOUT:'b-gray',CREATE:'b-blue',READ:'b-gray',UPDATE:'b-yellow','DELETE':'b-red','DELETE (SOFT)':'b-red',PRINT:'b-purple',EXPORT:'b-purple',VIEW:'b-gray'};
const ROLE_COLOR={Admin:'b-red',Pengelola:'b-blue',TU:'b-gray'};

let data=[
  {id:1,waktu:'2025-01-26 14:22',user:'Admin',role:'Admin',aksi:'CREATE',tabel:'surat_masuk',recordId:'SM-2025-089',ip:'192.168.1.10',status:'Berhasil'},
  {id:2,waktu:'2025-01-26 14:18',user:'Admin',role:'Admin',aksi:'LOGIN',tabel:'auth',recordId:'usr-001',ip:'192.168.1.10',status:'Berhasil'},
  {id:3,waktu:'2025-01-26 11:05',user:'Siti.Rahayu',role:'Pengelola',aksi:'UPDATE',tabel:'arsip',recordId:'ARK-2024-012',ip:'192.168.1.22',status:'Berhasil'},
  {id:4,waktu:'2025-01-26 10:44',user:'Siti.Rahayu',role:'Pengelola',aksi:'READ',tabel:'arsip',recordId:'ARK-2023-089',ip:'192.168.1.22',status:'Berhasil'},
  {id:5,waktu:'2025-01-26 09:30',user:'Budi.Santoso',role:'TU',aksi:'CREATE',tabel:'peminjaman_arsip',recordId:'FP-2025-003',ip:'192.168.1.31',status:'Berhasil'},
  {id:6,waktu:'2025-01-25 16:45',user:'Admin',role:'Admin',aksi:'DELETE (SOFT)',tabel:'arsip',recordId:'ARK-2010-001',ip:'192.168.1.10',status:'Berhasil'},
  {id:7,waktu:'2025-01-25 15:20',user:'Dewi.S',role:'TU',aksi:'CREATE',tabel:'surat_masuk',recordId:'SM-2025-088',ip:'192.168.1.45',status:'Berhasil'},
  {id:8,waktu:'2025-01-25 14:00',user:'Siti.Rahayu',role:'Pengelola',aksi:'EXPORT',tabel:'surat_keluar',recordId:'—',ip:'192.168.1.22',status:'Berhasil'},
  {id:9,waktu:'2025-01-25 11:30',user:'Admin',role:'Admin',aksi:'UPDATE',tabel:'profiles',recordId:'usr-003',ip:'192.168.1.10',status:'Berhasil'},
  {id:10,waktu:'2025-01-25 09:00',user:'Budi.Santoso',role:'TU',aksi:'LOGIN',tabel:'auth',recordId:'usr-002',ip:'192.168.1.31',status:'Berhasil'},
  {id:11,waktu:'2025-01-24 16:00',user:'Anonim',role:'TU',aksi:'LOGIN',tabel:'auth',recordId:'—',ip:'192.168.99.1',status:'GAGAL'},
  {id:12,waktu:'2025-01-24 14:30',user:'Admin',role:'Admin',aksi:'CREATE',tabel:'pemusnahan_arsip',recordId:'ARK-2011-034',ip:'192.168.1.10',status:'Berhasil'},
  {id:13,waktu:'2025-01-24 11:00',user:'Siti.Rahayu',role:'Pengelola',aksi:'PRINT',tabel:'peminjaman_arsip',recordId:'FP-2025-002',ip:'192.168.1.22',status:'Berhasil'},
  {id:14,waktu:'2025-01-23 15:45',user:'Dewi.S',role:'TU',aksi:'CREATE',tabel:'surat_keluar',recordId:'SK-2025-042',ip:'192.168.1.45',status:'Berhasil'},
  {id:15,waktu:'2025-01-23 13:00',user:'Admin',role:'Admin',aksi:'UPDATE',tabel:'regulasi',recordId:'reg-003',ip:'192.168.1.10',status:'Berhasil'},
];

let filtered=[...data], page=1;
const RPP=12;

function updateStats(){
  document.getElementById('st-total').textContent=data.length;
  document.getElementById('st-login').textContent=data.filter(d=>d.aksi==='LOGIN'&&d.status==='Berhasil').length;
  document.getElementById('st-create').textContent=data.filter(d=>d.aksi==='CREATE').length;
  document.getElementById('st-update').textContent=data.filter(d=>d.aksi==='UPDATE').length;
  document.getElementById('st-delete').textContent=data.filter(d=>d.aksi.includes('DELETE')).length;
}

function renderTable(){
  const start=(page-1)*RPP, rows=filtered.slice(start,start+RPP);
  document.getElementById('body-audit').innerHTML=rows.length?rows.map(r=>`
    <tr style="${r.status==='GAGAL'?'background:var(--redL)':''}">
      <td class="td-mono" style="color:var(--text3)">${r.id}</td>
      <td class="td-mono" style="white-space:nowrap;font-size:11px">${r.waktu}</td>
      <td><strong>${r.user}</strong></td>
      <td>${badgePlain(r.role,ROLE_COLOR[r.role]||'b-gray')}</td>
      <td><span style="font-family:'Courier New',monospace;font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:4px;border:1px solid var(--border)">${r.aksi}</span></td>
      <td style="font-size:11px;color:var(--text2)">${r.tabel}</td>
      <td class="td-mono" style="color:var(--accent)">${r.recordId}</td>
      <td class="td-mono" style="font-size:11px">${r.ip}</td>
      <td>${badge(r.status)}</td>
    </tr>`).join(''):`<tr><td colspan="9"><div class="empty"><div class="empty-ico">📝</div><div class="empty-txt">Tidak ada log ditemukan</div></div></td></tr>`;
  document.getElementById('row-count').textContent=filtered.length?`${start+1}–${Math.min(start+RPP,filtered.length)} dari ${filtered.length} log`:'';
  renderPagination();
  updateStats();
}

function renderPagination(){
  const total=Math.ceil(filtered.length/RPP), el=document.getElementById('pagination');
  if(total<=1){el.innerHTML='';return;}
  let h=`<button class="page-btn" onclick="gp(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=total;i++)h+=`<button class="page-btn ${i===page?'active':''}" onclick="gp(${i})">${i}</button>`;
  h+=`<button class="page-btn" onclick="gp(${page+1})" ${page===total?'disabled':''}>›</button>`;
  el.innerHTML=h;
}
function gp(p){const t=Math.ceil(filtered.length/RPP);if(p<1||p>t)return;page=p;renderTable();}

function applyFilter(){
  const q=document.getElementById('g-search').value.toLowerCase();
  const rl=document.getElementById('f-role').value;
  const ak=document.getElementById('f-aksi').value;
  const tb=document.getElementById('f-tabel').value;
  const dr=document.getElementById('f-dari').value;
  const sp=document.getElementById('f-sampai').value;
  filtered=data.filter(r=>{
    if(q&&!JSON.stringify(r).toLowerCase().includes(q))return false;
    if(rl&&r.role!==rl)return false;
    if(ak&&r.aksi!==ak)return false;
    if(tb&&r.tabel!==tb)return false;
    if(dr&&r.waktu.slice(0,10)<dr)return false;
    if(sp&&r.waktu.slice(0,10)>sp)return false;
    return true;
  });
  page=1;renderTable();
}
function resetFilter(){
  ['g-search','f-dari','f-sampai'].forEach(id=>document.getElementById(id).value='');
  ['f-role','f-aksi','f-tabel'].forEach(id=>document.getElementById(id).value='');
  filtered=[...data];page=1;renderTable();
}

// Simulate live log append
function addLog(user,role,aksi,tabel,recordId,ip,status='Berhasil'){
  const now=new Date();
  const waktu=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  data.unshift({id:data.length+1,waktu,user,role,aksi,tabel,recordId,ip,status});
  filtered=[...data];renderTable();
}

renderTable();
</script>
</body>
</html>
