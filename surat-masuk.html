<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Surat Masuk — SIMARESDA Arsip</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/simas.css">
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <div class="notif-bar" onclick="openNotifModal()"><span class="notif-pulse"></span><span id="notif-text">Sistem aktif</span></div>
  <div class="topbar">
    <div class="topbar-title">Surat Masuk</div>
    <div class="search-wrap no-print"><span class="search-ico">🔍</span><input type="text" id="g-search" placeholder="Cari nomor, asal, perihal..." oninput="applyFilter()"></div>
    <div class="topbar-actions no-print">
      <button class="icon-btn" id="btn-theme" onclick="toggleDark()">🌙</button>
      <button class="icon-btn" onclick="window.print()">🖨️</button>
      <div style="position:relative"><button class="icon-btn" onclick="openNotifModal()">🔔</button><span id="notif-count" style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center">0</span></div>
    </div>
  </div>
  <div class="content">
    <div class="toolbar no-print">
      <button class="btn btn-primary" onclick="openAdd()">+ Tambah Surat Masuk</button>
      <select id="filter-status" onchange="applyFilter()" style="width:148px"><option value="">Semua Status</option><option>Disposisi</option><option>Diproses</option><option>Selesai</option><option>Arsip</option></select>
      <select id="filter-kat" onchange="applyFilter()" style="width:148px"><option value="">Semua Kategori</option><option>Umum</option><option>Keuangan</option><option>Kepegawaian</option><option>Teknis</option><option>Rahasia</option></select>
      <input type="date" id="f-dari" onchange="applyFilter()" title="Dari tanggal" style="width:138px">
      <input type="date" id="f-sampai" onchange="applyFilter()" title="Sampai tanggal" style="width:138px">
      <button class="btn btn-secondary" onclick="exportCSV('tbl-masuk','surat-masuk')">⬇ CSV</button>
      <button class="btn btn-secondary" onclick="resetFilter()">↺ Reset</button>
      <span id="row-count" style="font-size:12px;color:var(--text3);margin-left:auto"></span>
    </div>
    <div class="table-wrap">
      <table id="tbl-masuk">
        <thead><tr><th>No. Agenda</th><th>No. Surat</th><th>Tgl Surat</th><th>Tgl Terima</th><th>Asal Surat</th><th>Perihal</th><th>Kategori</th><th>Sifat</th><th>Status</th><th class="no-print">Aksi</th></tr></thead>
        <tbody id="body-masuk"></tbody>
      </table>
    </div>
    <div class="pagination no-print" id="pagination"></div>
  </div>
</div>

<!-- MODAL FORM -->
<div class="modal-overlay" id="modal-masuk" style="display:none" onclick="if(event.target===this)closeModal('modal-masuk')">
  <div class="modal modal-lg">
    <div class="modal-header"><div class="modal-title" id="m-title">✉️ Tambah Surat Masuk</div><button class="icon-btn" onclick="closeModal('modal-masuk')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nomor Surat <span class="req">*</span></label><input class="form-control" id="m-nosurat" placeholder="001/B/Kemenkes/I/2025"></div>
        <div class="form-group"><label class="form-label">Tanggal Surat <span class="req">*</span></label><input class="form-control" type="date" id="m-tglsurat"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tanggal Terima <span class="req">*</span></label><input class="form-control" type="date" id="m-tglt"></div>
        <div class="form-group"><label class="form-label">Asal Surat <span class="req">*</span></label><input class="form-control" id="m-asal" placeholder="Instansi pengirim"></div>
      </div>
      <div class="form-group"><label class="form-label">Perihal <span class="req">*</span></label><input class="form-control" id="m-perihal" placeholder="Perihal surat masuk"></div>
      <div class="form-row3">
        <div class="form-group"><label class="form-label">Kategori</label><select class="form-control" id="m-kat"><option>Umum</option><option>Keuangan</option><option>Kepegawaian</option><option>Teknis</option><option>Rahasia</option></select></div>
        <div class="form-group"><label class="form-label">Sifat</label><select class="form-control" id="m-sifat"><option>Biasa</option><option>Penting</option><option>Segera</option><option>Rahasia</option></select></div>
        <div class="form-group"><label class="form-label">Status</label><select class="form-control" id="m-status"><option>Disposisi</option><option>Diproses</option><option>Selesai</option><option>Arsip</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">Disposisi Kepada</label><input class="form-control" id="m-disposisi" placeholder="Nama / jabatan penerima disposisi"></div>
      <div class="form-group"><label class="form-label">Keterangan</label><textarea class="form-control" id="m-ket" placeholder="Catatan tambahan..."></textarea></div>
      <div class="form-group"><label class="form-label">Lampiran</label><input class="form-control" type="file" id="m-file" accept=".pdf,.doc,.docx,.jpg,.png"><div class="form-hint">PDF, DOC, JPG · Max 10MB (upload ke Supabase Storage saat produksi)</div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-masuk')">Batal</button><button class="btn btn-primary" onclick="saveSuratMasuk()">💾 Simpan</button></div>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modal-detail" style="display:none" onclick="if(event.target===this)closeModal('modal-detail')">
  <div class="modal"><div class="modal-header"><div class="modal-title">📄 Detail Surat Masuk</div><button class="icon-btn" onclick="closeModal('modal-detail')">✕</button></div><div class="modal-body" id="detail-body"></div><div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-detail')">Tutup</button><button class="btn btn-primary" onclick="window.print()">🖨️ Print</button></div></div>
</div>

<!-- NOTIF MODAL -->
<div class="modal-overlay" id="modal-notif" style="display:none" onclick="if(event.target===this)closeModal('modal-notif')"><div class="modal" style="width:min(420px,95vw)"><div class="modal-header"><div class="modal-title">🔔 Notifikasi</div><button class="icon-btn" onclick="closeModal('modal-notif')">✕</button></div><div class="modal-body" id="notif-list" style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto"></div></div></div>

<script src="assets/simas-ui.js"></script>
<script>
document.getElementById('sidebar').innerHTML=`<div class="logo-wrap"><div class="logo-icon">📁</div><div><div class="logo-title">SIMARESDA</div><div class="logo-year">Arsip Daerah · 2025–2030</div></div></div><nav class="nav-scroll"><div class="nav-section">Menu Utama</div><a class="nav-item" href="index.html"><span class="nav-icon">📊</span>Dashboard</a><a class="nav-item active" href="surat-masuk.html"><span class="nav-icon">📥</span>Surat Masuk<span class="nav-badge" id="nav-badge">0</span></a><a class="nav-item" href="surat-keluar.html"><span class="nav-icon">📤</span>Surat Keluar</a><div class="nav-section">Arsip</div><a class="nav-item" href="peminjaman.html"><span class="nav-icon">🔖</span>Peminjaman</a><a class="nav-item" href="penyimpanan.html"><span class="nav-icon">🗄️</span>Penyimpanan</a><a class="nav-item" href="pemusnahan.html"><span class="nav-icon">🗑️</span>Pemusnahan</a><div class="nav-section">Referensi</div><a class="nav-item" href="regulasi.html"><span class="nav-icon">📋</span>Regulasi</a><a class="nav-item" href="audit.html"><span class="nav-icon">📝</span>Audit Trail</a></nav><div class="sidebar-footer"><div class="user-pill"><div class="avatar" data-user-avatar>AD</div><div class="user-info"><div class="user-name" data-user-name>Administrator</div><div class="user-role" data-user-role>Admin</div></div></div><button class="logout-btn" onclick="logout()">↩ Keluar</button></div>`;
simasInit();

let data=[
  {id:'SM-2025-001',no:'001/B/Kemenkes/I/2025',tglSurat:'2025-01-03',tglTerima:'2025-01-05',asal:'Kementerian Kesehatan RI',perihal:'Laporan Tahunan Program Kesehatan Nasional 2024',kat:'Umum',sifat:'Penting',status:'Disposisi',disposisi:'Kepala Biro',ket:'Tindaklanjuti 3 hari kerja'},
  {id:'SM-2025-002',no:'B-012/PUPR/I/2025',tglSurat:'2025-01-07',tglTerima:'2025-01-08',asal:'Kementerian PUPR',perihal:'Pemberitahuan Pelaksanaan Audit Internal Q1 2025',kat:'Teknis',sifat:'Biasa',status:'Diproses',disposisi:'Kabag Umum',ket:''},
  {id:'SM-2025-003',no:'S-045/KemDAGRI/I/2025',tglSurat:'2025-01-10',tglTerima:'2025-01-11',asal:'Kemendagri',perihal:'Edaran Tata Kelola Kepegawaian Tahun 2025',kat:'Kepegawaian',sifat:'Penting',status:'Selesai',disposisi:'Kabag Kepegawaian',ket:'Sudah dibalas'},
  {id:'SM-2025-004',no:'003/K/BKN/I/2025',tglSurat:'2025-01-14',tglTerima:'2025-01-15',asal:'Badan Kepegawaian Negara',perihal:'Surat Pengantar Peserta Diklat Prajabatan 2025',kat:'Kepegawaian',sifat:'Biasa',status:'Arsip',disposisi:'',ket:''},
  {id:'SM-2025-005',no:'SK-088/BPKP/I/2025',tglSurat:'2025-01-20',tglTerima:'2025-01-22',asal:'BPKP',perihal:'Undangan Rapat Koordinasi Pengawasan Internal',kat:'Keuangan',sifat:'Segera',status:'Disposisi',disposisi:'Kabag Keuangan',ket:'Rapat 28 Jan 2025'},
  {id:'SM-2025-006',no:'R-002/ANRI/I/2025',tglSurat:'2025-01-21',tglTerima:'2025-01-22',asal:'Arsip Nasional RI',perihal:'Sosialisasi Peraturan Kearsipan Terbaru',kat:'Umum',sifat:'Biasa',status:'Diproses',disposisi:'Kepala Unit Kearsipan',ket:''},
  {id:'SM-2025-007',no:'ST-019/MENPAN/I/2025',tglSurat:'2025-01-23',tglTerima:'2025-01-24',asal:'KemenPANRB',perihal:'Pedoman Reformasi Birokrasi 2025',kat:'Umum',sifat:'Penting',status:'Disposisi',disposisi:'Sekretaris',ket:''},
  {id:'SM-2025-008',no:'001/R/BPJS/I/2025',tglSurat:'2025-01-25',tglTerima:'2025-01-26',asal:'BPJS Kesehatan',perihal:'Konfirmasi Pendaftaran Kepesertaan 2025',kat:'Kepegawaian',sifat:'Biasa',status:'Selesai',disposisi:'',ket:''},
];
let editIdx=null, seq=data.length+1, page=1, filtered=[...data];
const RPP=10;

function renderTable(){
  const start=(page-1)*RPP;
  const rows=filtered.slice(start,start+RPP);
  const tbody=document.getElementById('body-masuk');
  tbody.innerHTML=rows.length?rows.map(s=>`
    <tr>
      <td class="td-mono">${s.id}</td>
      <td class="td-mono" style="font-size:11px">${s.no}</td>
      <td>${s.tglSurat}</td><td>${s.tglTerima}</td>
      <td><strong>${s.asal}</strong></td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.perihal}">${s.perihal}</td>
      <td>${badgePlain(s.kat,'b-gray')}</td>
      <td>${badgePlain(s.sifat,s.sifat==='Segera'?'b-red':s.sifat==='Penting'?'b-yellow':'b-gray')}</td>
      <td>${badge(s.status)}</td>
      <td class="no-print" style="white-space:nowrap">
        <button class="btn btn-secondary btn-xs" onclick='viewDetail(${JSON.stringify(s)})'>👁</button>
        <button class="btn btn-secondary btn-xs" onclick='editRow(${JSON.stringify(s)})'>✏️</button>
        <button class="btn btn-danger btn-xs" onclick="deleteRow('${s.id}')" data-require-role="Admin">🗑</button>
      </td>
    </tr>`).join(''):`<tr><td colspan="10"><div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Tidak ada data</div></div></td></tr>`;
  document.getElementById('row-count').textContent=filtered.length?`${start+1}–${Math.min(start+RPP,filtered.length)} dari ${filtered.length} surat`:'';
  renderPagination();
  document.getElementById('nav-badge').textContent=data.filter(s=>s.status==='Disposisi').length;
  applyRoleGuards(window.SIMARESDA_USER?.role);
}

function renderPagination(){
  const total=Math.ceil(filtered.length/RPP);
  const el=document.getElementById('pagination');
  if(total<=1){el.innerHTML='';return;}
  let h=`<button class="page-btn" onclick="gp(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=total;i++)h+=`<button class="page-btn ${i===page?'active':''}" onclick="gp(${i})">${i}</button>`;
  h+=`<button class="page-btn" onclick="gp(${page+1})" ${page===total?'disabled':''}>›</button>`;
  el.innerHTML=h;
}
function gp(p){const t=Math.ceil(filtered.length/RPP);if(p<1||p>t)return;page=p;renderTable();}

function applyFilter(){
  const q=document.getElementById('g-search').value.toLowerCase();
  const st=document.getElementById('filter-status').value;
  const kt=document.getElementById('filter-kat').value;
  const dr=document.getElementById('f-dari').value;
  const sp=document.getElementById('f-sampai').value;
  filtered=data.filter(s=>{
    if(q&&!JSON.stringify(s).toLowerCase().includes(q))return false;
    if(st&&s.status!==st)return false;
    if(kt&&s.kat!==kt)return false;
    if(dr&&s.tglTerima<dr)return false;
    if(sp&&s.tglTerima>sp)return false;
    return true;
  });
  page=1;renderTable();
}
function resetFilter(){['g-search','f-dari','f-sampai'].forEach(id=>document.getElementById(id).value='');document.getElementById('filter-status').value='';document.getElementById('filter-kat').value='';filtered=[...data];page=1;renderTable();}

function openAdd(){
  editIdx=null;document.getElementById('m-title').textContent='✉️ Tambah Surat Masuk';
  ['m-nosurat','m-tglsurat','m-tglt','m-asal','m-perihal','m-disposisi','m-ket'].forEach(id=>document.getElementById(id).value='');
  openModal('modal-masuk');
}
function editRow(s){
  editIdx=s.id;document.getElementById('m-title').textContent='✏️ Edit Surat Masuk';
  document.getElementById('m-nosurat').value=s.no;
  document.getElementById('m-tglsurat').value=s.tglSurat;
  document.getElementById('m-tglt').value=s.tglTerima;
  document.getElementById('m-asal').value=s.asal;
  document.getElementById('m-perihal').value=s.perihal;
  document.getElementById('m-kat').value=s.kat;
  document.getElementById('m-sifat').value=s.sifat;
  document.getElementById('m-status').value=s.status;
  document.getElementById('m-disposisi').value=s.disposisi||'';
  document.getElementById('m-ket').value=s.ket||'';
  openModal('modal-masuk');
}
function saveSuratMasuk(){
  const no=document.getElementById('m-nosurat').value.trim();
  const tgl=document.getElementById('m-tglsurat').value;
  const tgt=document.getElementById('m-tglt').value;
  const asl=document.getElementById('m-asal').value.trim();
  const per=document.getElementById('m-perihal').value.trim();
  if(!no||!tgl||!tgt||!asl||!per){showToast('Harap isi semua field wajib (*)','danger');return;}
  const obj={
    id:editIdx||`SM-2025-${String(seq++).padStart(3,'0')}`,
    no,tglSurat:tgl,tglTerima:tgt,asal:asl,perihal:per,
    kat:document.getElementById('m-kat').value,
    sifat:document.getElementById('m-sifat').value,
    status:document.getElementById('m-status').value,
    disposisi:document.getElementById('m-disposisi').value,
    ket:document.getElementById('m-ket').value,
  };
  if(editIdx){const i=data.findIndex(d=>d.id===editIdx);if(i>=0)data[i]=obj;}
  else data.unshift(obj);
  editIdx=null;closeModal('modal-masuk');
  filtered=[...data];renderTable();
  showToast('✅ Data surat masuk disimpan','success');
  pushNotif(`📥 Surat masuk ${obj.id} ${editIdx?'diperbarui':'ditambahkan'}`,'info');
}
function deleteRow(id){
  if(!confirm(`Hapus surat masuk ${id}?`))return;
  data=data.filter(d=>d.id!==id);filtered=[...data];renderTable();
  showToast(`🗑️ ${id} dihapus`,'warn');
}
function viewDetail(s){
  document.getElementById('detail-body').innerHTML=`
  <table style="width:100%;border-collapse:collapse;font-size:13px">
    ${[['No. Agenda',s.id],['No. Surat',`<span class="td-mono">${s.no}</span>`],['Tanggal Surat',s.tglSurat],['Tanggal Terima',s.tglTerima],['Asal Surat',`<strong>${s.asal}</strong>`],['Perihal',s.perihal],['Kategori',s.kat],['Sifat',s.sifat],['Status',badge(s.status)],['Disposisi',s.disposisi||'—'],['Keterangan',s.ket||'—']].map(([k,v])=>`<tr><td style="padding:8px 12px;width:38%;font-weight:600;color:var(--text2);border:1px solid var(--border)">${k}</td><td style="padding:8px 12px;border:1px solid var(--border)">${v}</td></tr>`).join('')}
  </table>`;
  openModal('modal-detail');
}

renderTable();
</script>
</body>
</html>
