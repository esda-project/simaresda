<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Regulasi — SIMARESDA</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/simas.css">
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <div class="notif-bar" onclick="openNotifModal()"><span class="notif-pulse"></span><span id="notif-text">Sistem aktif</span></div>
  <div class="topbar">
    <div class="topbar-title">Regulasi & Peraturan Kearsipan</div>
    <div class="search-wrap no-print"><span class="search-ico">🔍</span><input type="text" id="g-search" placeholder="Cari judul, nomor, instansi..." oninput="renderReg()"></div>
    <div class="topbar-actions no-print">
      <button class="icon-btn" id="btn-theme" onclick="toggleDark()">🌙</button>
      <button class="icon-btn" onclick="window.print()">🖨️</button>
      <div style="position:relative"><button class="icon-btn" onclick="openNotifModal()">🔔</button><span id="notif-count" style="position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center">0</span></div>
    </div>
  </div>
  <div class="content">
    <!-- Filter tabs -->
    <div class="tabs no-print" style="margin-bottom:16px">
      <button class="tab-btn active" onclick="setKat('',this)">Semua</button>
      <button class="tab-btn" onclick="setKat('UU',this)">Undang-Undang</button>
      <button class="tab-btn" onclick="setKat('PP',this)">Peraturan Pemerintah</button>
      <button class="tab-btn" onclick="setKat('ANRI',this)">Peraturan ANRI</button>
      <button class="tab-btn" onclick="setKat('SE',this)">Surat Edaran</button>
      <button class="tab-btn" onclick="setKat('PERDA',this)">Perda</button>
    </div>

    <!-- Admin: Tambah regulasi -->
    <div class="toolbar no-print" data-require-role="Admin" style="margin-bottom:14px">
      <button class="btn btn-primary" onclick="openModal('modal-reg')">+ Tambah Regulasi</button>
      <span style="font-size:12px;color:var(--text3)">CMS Regulasi — Hanya Admin yang dapat mengelola</span>
    </div>

    <div id="reg-list" style="display:flex;flex-direction:column;gap:10px"></div>
    <div id="reg-empty" class="empty" style="display:none"><div class="empty-ico">📋</div><div class="empty-txt">Tidak ada regulasi ditemukan</div></div>
  </div>
</div>

<!-- MODAL TAMBAH (Admin CMS) -->
<div class="modal-overlay" id="modal-reg" style="display:none" onclick="if(event.target===this)closeModal('modal-reg')">
  <div class="modal">
    <div class="modal-header"><div class="modal-title" id="reg-modal-title">📋 Tambah Regulasi</div><button class="icon-btn" onclick="closeModal('modal-reg')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Jenis <span class="req">*</span></label><select class="form-control" id="r-jenis"><option>UU</option><option>PP</option><option>ANRI</option><option>SE</option><option>PERDA</option></select></div>
        <div class="form-group"><label class="form-label">Nomor <span class="req">*</span></label><input class="form-control" id="r-nomor" placeholder="Cth: 43"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tahun <span class="req">*</span></label><input class="form-control" id="r-tahun" type="number" placeholder="2012"></div>
        <div class="form-group"><label class="form-label">Instansi Penerbit</label><input class="form-control" id="r-instansi" placeholder="DPR RI / Presiden RI / ANRI"></div>
      </div>
      <div class="form-group"><label class="form-label">Judul <span class="req">*</span></label><input class="form-control" id="r-judul" placeholder="Judul lengkap peraturan"></div>
      <div class="form-group"><label class="form-label">Ringkasan</label><textarea class="form-control" id="r-ringkasan" placeholder="Ringkasan isi peraturan..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Link URL</label><input class="form-control" id="r-link" placeholder="https://jdih.kemenkumham.go.id/..."></div>
        <div class="form-group"><label class="form-label">Upload File</label><input class="form-control" type="file" id="r-file" accept=".pdf"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-reg')">Batal</button><button class="btn btn-primary" onclick="saveReg()">💾 Simpan</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-notif" style="display:none" onclick="if(event.target===this)closeModal('modal-notif')"><div class="modal" style="width:min(420px,95vw)"><div class="modal-header"><div class="modal-title">🔔 Notifikasi</div><button class="icon-btn" onclick="closeModal('modal-notif')">✕</button></div><div class="modal-body" id="notif-list" style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto"></div></div></div>

<script src="assets/simas-ui.js"></script>
<script>
document.getElementById('sidebar').innerHTML=`<div class="logo-wrap"><div class="logo-icon">📁</div><div><div class="logo-title">SIMARESDA</div><div class="logo-year">Arsip Daerah · 2025–2030</div></div></div><nav class="nav-scroll"><div class="nav-section">Menu Utama</div><a class="nav-item" href="index.html"><span class="nav-icon">📊</span>Dashboard</a><a class="nav-item" href="surat-masuk.html"><span class="nav-icon">📥</span>Surat Masuk</a><a class="nav-item" href="surat-keluar.html"><span class="nav-icon">📤</span>Surat Keluar</a><div class="nav-section">Arsip</div><a class="nav-item" href="peminjaman.html"><span class="nav-icon">🔖</span>Peminjaman</a><a class="nav-item" href="penyimpanan.html"><span class="nav-icon">🗄️</span>Penyimpanan</a><a class="nav-item" href="pemusnahan.html"><span class="nav-icon">🗑️</span>Pemusnahan</a><div class="nav-section">Referensi</div><a class="nav-item active" href="regulasi.html"><span class="nav-icon">📋</span>Regulasi</a><a class="nav-item" href="audit.html"><span class="nav-icon">📝</span>Audit Trail</a></nav><div class="sidebar-footer"><div class="user-pill"><div class="avatar" data-user-avatar>AD</div><div class="user-info"><div class="user-name" data-user-name>Administrator</div><div class="user-role" data-user-role>Admin</div></div></div><button class="logout-btn" onclick="logout()">↩ Keluar</button></div>`;
simasInit();

const BADGE_COLOR={UU:'b-red',PP:'b-blue',ANRI:'b-green',SE:'b-yellow',PERDA:'b-purple'};

let regData=[
  {id:1,jenis:'UU',nomor:'43',tahun:2009,instansi:'DPR RI',judul:'Undang-Undang tentang Kearsipan',ringkasan:'Mengatur penyelenggaraan kearsipan yang komprehensif dan terpadu, meliputi pengelolaan arsip dinamis dan arsip statis, pembinaan kearsipan, serta sanksi pelanggaran.',link:'https://jdih.anri.go.id',aktif:true},
  {id:2,jenis:'PP',nomor:'28',tahun:2012,instansi:'Presiden RI',judul:'Pelaksanaan Undang-Undang Nomor 43 Tahun 2009 tentang Kearsipan',ringkasan:'Peraturan pelaksana UU Kearsipan yang mengatur secara rinci pengelolaan arsip dinamis, arsip statis, akreditasi kearsipan, dan pembinaan SDM kearsipan.',link:'https://jdih.anri.go.id',aktif:true},
  {id:3,jenis:'ANRI',nomor:'37',tahun:2016,instansi:'ANRI',judul:'Pedoman Penyusutan Arsip',ringkasan:'Pedoman teknis penyusutan arsip meliputi pemindahan arsip inaktif, pemusnahan arsip yang tidak bernilai guna, dan penyerahan arsip statis ke lembaga kearsipan.',link:'https://jdih.anri.go.id',aktif:true},
  {id:4,jenis:'ANRI',nomor:'9',tahun:2018,instansi:'ANRI',judul:'Pedoman Pembuatan dan Penggunaan Arsip dalam Pelaksanaan Kegiatan',ringkasan:'Mengatur standar pembuatan naskah dinas, tata cara penggunaan arsip, dan pengelolaan arsip aktif pada unit pengolah.',link:'https://jdih.anri.go.id',aktif:true},
  {id:5,jenis:'ANRI',nomor:'19',tahun:2012,instansi:'ANRI',judul:'Pedoman Pengelolaan Arsip Aktif di Lingkungan Pemerintahan',ringkasan:'Panduan teknis pengelolaan arsip aktif di unit pengolah, meliputi pemberkasan, penataan, penemuan kembali, dan pemeliharaan arsip aktif.',link:'https://jdih.anri.go.id',aktif:true},
  {id:6,jenis:'SE',nomor:'6',tahun:2020,instansi:'KemenPANRB',judul:'Surat Edaran tentang Digitalisasi Arsip dan Dokumen Pemerintah',ringkasan:'Mendorong instansi pemerintah untuk melakukan digitalisasi arsip dan dokumen dalam rangka mendukung transformasi digital pemerintahan.',link:'#',aktif:true},
  {id:7,jenis:'PP',nomor:'45',tahun:2017,instansi:'Presiden RI',judul:'Partisipasi Masyarakat dalam Penyelenggaraan Pemerintahan Daerah',ringkasan:'Mengatur bentuk partisipasi masyarakat termasuk akses terhadap arsip dan dokumen publik di lingkungan pemerintah daerah.',link:'#',aktif:true},
  {id:8,jenis:'ANRI',nomor:'5',tahun:2021,instansi:'ANRI',judul:'Pedoman Alih Media Arsip',ringkasan:'Ketentuan teknis pelaksanaan alih media arsip dari media kertas ke media elektronik, termasuk standar kualitas, autentikasi, dan penyimpanan arsip digital.',link:'#',aktif:true},
];
let activeKat='', editId=null;

function setKat(kat, btn){
  activeKat=kat;
  document.querySelectorAll('.tabs .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderReg();
}

function renderReg(){
  const q=document.getElementById('g-search').value.toLowerCase();
  const list=regData.filter(r=>{
    if(!r.aktif)return false;
    if(activeKat&&r.jenis!==activeKat)return false;
    if(q&&!JSON.stringify(r).toLowerCase().includes(q))return false;
    return true;
  });
  const el=document.getElementById('reg-list');
  const em=document.getElementById('reg-empty');
  if(!list.length){el.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  const isAdmin=window.SIMARESDA_USER?.role==='Admin';
  el.innerHTML=list.map(r=>`
    <div style="display:flex;align-items:flex-start;gap:14px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);transition:.18s;cursor:default" onmouseover="this.style.borderColor='var(--accent)';this.style.transform='translateY(-1px)';this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.borderColor='var(--border)';this.style.transform='';this.style.boxShadow=''">
      <div style="flex-shrink:0;text-align:center;min-width:54px">
        <span class="badge ${BADGE_COLOR[r.jenis]||'b-gray'}" style="font-size:12px;padding:4px 10px">${r.jenis}</span>
        <div style="font-size:10px;color:var(--text3);margin-top:4px">No.${r.nomor}/${r.tahun}</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px;color:var(--text);margin-bottom:4px">${r.judul}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px">📌 ${r.instansi} · Tahun ${r.tahun}</div>
        ${r.ringkasan?`<div style="font-size:12px;color:var(--text2);line-height:1.6">${r.ringkasan}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
        ${r.link&&r.link!=='#'?`<a href="${r.link}" target="_blank" class="btn btn-secondary btn-sm">📄 Lihat</a>`:'<button class="btn btn-secondary btn-sm" disabled>📄 Lihat</button>'}
        ${isAdmin?`<button class="btn btn-secondary btn-sm" onclick='editReg(${JSON.stringify(r)})'>✏️ Edit</button><button class="btn btn-danger btn-sm" onclick="delReg(${r.id})">🗑</button>`:''}
      </div>
    </div>`).join('');
}

function saveReg(){
  const judul=document.getElementById('r-judul').value.trim();
  const nomor=document.getElementById('r-nomor').value.trim();
  const tahun=document.getElementById('r-tahun').value;
  if(!judul||!nomor||!tahun){showToast('Harap isi field wajib (*)','danger');return;}
  const obj={
    id:editId||Date.now(),jenis:document.getElementById('r-jenis').value,nomor,tahun:Number(tahun),
    instansi:document.getElementById('r-instansi').value||'—',judul,
    ringkasan:document.getElementById('r-ringkasan').value,
    link:document.getElementById('r-link').value||'#',aktif:true
  };
  if(editId){const i=regData.findIndex(r=>r.id===editId);if(i>=0)regData[i]=obj;}
  else regData.unshift(obj);
  editId=null;closeModal('modal-reg');renderReg();
  showToast('✅ Regulasi berhasil disimpan','success');
}
function editReg(r){
  editId=r.id;document.getElementById('reg-modal-title').textContent='✏️ Edit Regulasi';
  document.getElementById('r-jenis').value=r.jenis;document.getElementById('r-nomor').value=r.nomor;
  document.getElementById('r-tahun').value=r.tahun;document.getElementById('r-instansi').value=r.instansi;
  document.getElementById('r-judul').value=r.judul;document.getElementById('r-ringkasan').value=r.ringkasan||'';
  document.getElementById('r-link').value=r.link||'';
  openModal('modal-reg');
}
function delReg(id){
  if(!confirm('Hapus regulasi ini?'))return;
  regData=regData.filter(r=>r.id!==id);renderReg();showToast('🗑️ Regulasi dihapus','warn');
}

// Reset modal saat open tambah baru
document.querySelector('[onclick="openModal(\'modal-reg\')"]')?.addEventListener('click',()=>{
  editId=null;document.getElementById('reg-modal-title').textContent='📋 Tambah Regulasi';
  ['r-nomor','r-tahun','r-instansi','r-judul','r-ringkasan','r-link'].forEach(id=>document.getElementById(id).value='');
});
renderReg();
</script>
</body>
</html>
